name: Security Scan Triage

on:
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  pull-requests: write
  security-events: write
  id-token: write   # required for OIDC role assumption (no long-lived AWS keys)

jobs:
  triage:
    name: Scan, triage, and comment
    runs-on: ubuntu-latest
    # Fail closed for fork PRs regardless of the repo's "fork pull request
    # workflows" approval setting — this job never assumes the AWS role or
    # calls Bedrock unless the PR comes from this repo itself.
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Dogfoods this repo's own composite action (./action.yml) against
      # itself. Other repos reference this the same way, but with
      # `uses: <owner>/Ci-mvp@v1` instead of a local `./` path.
      - name: Run ci-triage-agent (self-scan)
        uses: ./
        with:
          aws-role-to-assume: ${{ vars.CI_TRIAGE_AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
          bedrock-model-id: ${{ vars.BEDROCK_MODEL_ID || 'us.anthropic.claude-haiku-4-5-20251001-v1:0' }}

  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v
