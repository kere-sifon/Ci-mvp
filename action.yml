name: 'CI Triage Agent'
description: >
  Runs Trivy + Semgrep scans against the calling repo and posts an AI-triaged
  PR comment separating confirmed vulnerabilities from noise, using AWS
  Bedrock (Claude Haiku) as the classifier.
author: 'Kere Ekpenyong'

inputs:
  aws-role-to-assume:
    description: >
      ARN of an IAM role GitHub's OIDC provider can assume (recommended —
      no long-lived credentials needed). Requires `permissions: id-token:
      write` in the caller workflow. If set, takes priority over
      aws-access-key-id/aws-secret-access-key.
    required: false
    default: ''
  aws-role-session-name:
    description: 'Session name used when assuming aws-role-to-assume.'
    required: false
    default: 'ci-triage-agent'
  aws-access-key-id:
    description: >
      AWS access key ID for Bedrock (fallback auth — prefer aws-role-to-assume).
      Required only if aws-role-to-assume is not set.
    required: false
    default: ''
  aws-secret-access-key:
    description: >
      AWS secret access key for Bedrock (fallback auth — prefer aws-role-to-assume).
      Required only if aws-role-to-assume is not set.
    required: false
    default: ''
  aws-region:
    description: 'AWS region for Bedrock.'
    required: false
    default: 'us-east-1'
  bedrock-model-id:
    description: 'Bedrock inference profile ID for the classifier model.'
    required: false
    default: 'us.anthropic.claude-haiku-4-5-20251001-v1:0'
  bedrock-max-tokens:
    description: 'Max output tokens for the classifier call.'
    required: false
    default: '4096'
  bedrock-temperature:
    description: 'Sampling temperature for the classifier call.'
    required: false
    default: '0'
  semgrep-config:
    description: 'Semgrep ruleset to run.'
    required: false
    default: 'p/ci'
  trivy-severity:
    description: 'Comma-separated Trivy severities to scan for.'
    required: false
    default: 'CRITICAL,HIGH,MEDIUM'
  github-token:
    description: 'Token used to post/update the PR comment. Defaults to the caller workflow token.'
    required: false
    default: ${{ github.token }}
  pr-number:
    description: >
      Pull request number to comment on. Leave unset to auto-detect from the
      triggering pull_request event; if neither is available, the tool still
      runs and prints the triage comment to the job log without posting.
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      # No pip cache here: github.action_path resolves with a trailing "/."
      # segment for local `uses: ./` references (this repo's own self-scan),
      # and actions/setup-python's cache-dependency-path glob validator
      # rejects any "." or ".." path segment — caching isn't essential here,
      # so it's simplest to skip it rather than fight path normalization.
      uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
      with:
        python-version: '3.11'

    - name: Install ci-triage-agent dependencies
      shell: bash
      run: pip install -r "${{ github.action_path }}/requirements.txt"

    - name: Run Trivy filesystem scan
      # Pinned to a commit SHA, not a version tag — aquasecurity/trivy-action
      # suffered a supply-chain compromise in March 2026 where attackers
      # force-pushed malicious code onto 75 of 76 existing version tags.
      # v0.35.0 (this commit) was confirmed by the maintainers as the one
      # release NOT affected. Re-verify at the source before ever bumping
      # this: https://github.com/aquasecurity/trivy-action/releases
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 — verified safe
      with:
        scan-type: fs
        scan-ref: .
        format: json
        output: trivy-results.json
        severity: ${{ inputs.trivy-severity }}
        ignore-unfixed: true

    - name: Run Semgrep
      shell: bash
      env:
        SEMGREP_CONFIG: ${{ inputs.semgrep-config }}
      run: |
        pip install semgrep
        semgrep scan --config "$SEMGREP_CONFIG" --json \
          --output semgrep-results.json . || true
        if [ ! -f semgrep-results.json ]; then
          echo '{"results": []}' > semgrep-results.json
        fi

    - name: Validate AWS auth inputs
      shell: bash
      env:
        ROLE_TO_ASSUME: ${{ inputs.aws-role-to-assume }}
        ACCESS_KEY_ID: ${{ inputs.aws-access-key-id }}
        SECRET_ACCESS_KEY: ${{ inputs.aws-secret-access-key }}
      run: |
        if [ -z "$ROLE_TO_ASSUME" ] && \
           { [ -z "$ACCESS_KEY_ID" ] || [ -z "$SECRET_ACCESS_KEY" ]; }; then
          echo "::error::Provide either 'aws-role-to-assume' (recommended, OIDC) or both 'aws-access-key-id' and 'aws-secret-access-key'."
          exit 1
        fi

    - name: Configure AWS credentials (OIDC)
      if: inputs.aws-role-to-assume != ''
      uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
      with:
        role-to-assume: ${{ inputs.aws-role-to-assume }}
        role-session-name: ${{ inputs.aws-role-session-name }}
        aws-region: ${{ inputs.aws-region }}

    - name: Configure AWS credentials (static keys)
      if: inputs.aws-role-to-assume == ''
      uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ${{ inputs.aws-region }}

    # action.yml input `default:` fields can't use ${{ }} expressions (unlike
    # `with:` in a workflow), so the pull_request-number fallback is resolved
    # via the expression below — expressions ARE evaluated in `env:` regardless
    # of composite vs. workflow context, and routing it through env: (rather
    # than interpolating directly into the run: script) keeps this consistent
    # with the other steps, even though github.event.pull_request.number is a
    # GitHub-assigned integer, not attacker-controllable free text.
    - name: Run ci-triage-agent
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        LLM_PROVIDER: bedrock
        AWS_REGION: ${{ inputs.aws-region }}
        BEDROCK_MODEL_ID: ${{ inputs.bedrock-model-id }}
        BEDROCK_MAX_TOKENS: ${{ inputs.bedrock-max-tokens }}
        BEDROCK_TEMPERATURE: ${{ inputs.bedrock-temperature }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ inputs.pr-number || github.event.pull_request.number }}
      run: |
        if [ -n "$PR_NUMBER" ]; then
          python -m src.cli \
            --trivy-file "${{ github.workspace }}/trivy-results.json" \
            --semgrep-file "${{ github.workspace }}/semgrep-results.json" \
            --pr-number "$PR_NUMBER"
        else
          echo "No PR number available (not a pull_request event) — printing comment without posting."
          python -m src.cli \
            --trivy-file "${{ github.workspace }}/trivy-results.json" \
            --semgrep-file "${{ github.workspace }}/semgrep-results.json"
        fi
